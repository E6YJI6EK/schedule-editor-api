version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: schedule_mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: schedule_editor_api
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: schedule_editor_api
      DB_USERNAME: root
      DB_PASSWORD: secret
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    ports:
      - "8080:80"

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    container_name: frontend
    working_dir: /app/schedule-editor-app
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      API_PREFIX: /api
      API_PROXY_TARGET: http://backend/api/
      VITE_API_BASE: /api
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm run serve & sleep 5 && npm run dev -- --host"
    ports:
      - "5173:5173"
      - "3000:3000"
    volumes:
      - ./schedule-editor-app:/app/schedule-editor-app
      - /app/schedule-editor-app/node_modules

volumes:
  db_data:
